name: Build and Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

permissions:
  contents: write  # 需要 write 权限以便上传 release 资产
  packages: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    # 可选：缓存 NuGet 包以加速后续构建
    # - name: Cache NuGet packages
    #   uses: actions/cache@v4
    #   with:
    #     path: ${{ runner.os == 'Windows' && 'C:\\Users\\runneradmin\\.nuget\\packages' || '~/.nuget/packages' }}
    #     key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.sln') }}
    #     restore-keys: |
    #       nuget-${{ runner.os }}-

    - name: Restore NuGet packages
      run: nuget restore src/Assembly.sln

    - name: Build solution
      run: msbuild "src/Assembly.sln" /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create release package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Path output/Assembly -Force
        Copy-Item -Path "src/Assembly/bin/Win64/Release/*" -Destination output/Assembly/ -Recurse -Force -ErrorAction Stop
        Copy-Item -Path "fe/Assembly/*" -Destination output/Assembly/ -Recurse -Force -ErrorAction Stop

    - name: Zip package
      shell: pwsh
      run: |
        cd output
        if (Test-Path Assembly.zip) { Remove-Item Assembly.zip -Force }
        Compress-Archive -Path Assembly -DestinationPath Assembly.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Assembly
        path: output/Assembly.zip

    - name: Upload release asset
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: output/Assembly.zip
        asset_name: Assembly-${{ github.event.release.tag_name }}.zip
        asset_content_type: application/zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}